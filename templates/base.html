<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page_title %}{{ page_title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ url('assets/style.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="site-title" href="{{ url('') }}">{{ site.title }}</a>
        <nav aria-label="Main navigation">
          <ul class="nav-list">
            {% for nav_item in site.nav %}
            <li>
              <a href="{{ url(nav_item.path) }}" {% if current_section == nav_item.name %}aria-current="page"{% endif %}>{{ nav_item.label }}</a>
            </li>
            {% endfor %}
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

  </body>
</html>
